name: SonarQube Analysis

on:
  push:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install
      - name: Bypass ngrok warning
        run: |
          curl -H "ngrok-skip-browser-warning: true" https://remediable-carson-instructorial.ngrok-free.dev

      - uses: SonarSource/sonarqube-scan-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://remediable-carson-instructorial.ngrok-free.dev
          SONAR_SCANNER_OPTS: -Dsonar.ws.timeout=60

      - uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        env:
           SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
